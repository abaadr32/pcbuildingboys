    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Load architecture rendering products from JSON
        async function loadArchitectureProducts() {
            try {
                const response = await fetch('architecture.json');
                const data = await response.json();
                const container = document.getElementById('productsContainer');
                container.innerHTML = '';

                // Get the first build type
                const buildType = data.buildTypes[0];
                const parts = buildType.parts;

                // Iterate through each category (CPU, GPU)
                Object.keys(parts).forEach((category, categoryIndex) => {
                    const items = parts[category];
                    
                    // Add category heading
                    const categoryRow = document.createElement('div');
                    categoryRow.className = 'row mt-4 w-100 mx-0';
                    categoryRow.innerHTML = `
                        <div class="col-12">
                            <h3 class="mb-3" style="color: var(--secondary-color);">${category}</h3>
                        </div>
                    `;
                    container.appendChild(categoryRow);
                    
                    // Add product cards for each part in the category
                    const productsRow = document.createElement('div');
                    productsRow.className = 'row w-100 mx-0 mb-4';
                    
                    items.forEach((part, index) => {
                        const card = document.createElement('div');
                        card.className = 'col-6 col-md-4 mb-3 d-flex';
                        card.innerHTML = `
                            <div class="card w-100" data-id="${category}-${index}">
                                <img src="${part.image}" class="img-fluid rounded" alt="${part.name}" style="height: 200px; object-fit: cover;">
                                <div class="card-body">
                                    <h5 class="card-title">${part.name}</h5>
                                    <p class="card-text">${part.brand}</p>
                                </div>
                                <div class="card-footer bg-white border-0">
                                    <p class="price mb-2">$${part.price.toFixed(2)}</p>
                                </div>
                            </div>
                        `;
                        productsRow.appendChild(card);
                    });
                    
                    container.appendChild(productsRow);
                });
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsContainer').innerHTML = '<p class="text-danger">Error loading products</p>';
            }
        }

        // Load products when page loads
        document.addEventListener('DOMContentLoaded', loadArchitectureProducts);
    </script>
